<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Elite v3.0 Ultimate</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root {
            --bg-color: #0b0f19;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            --accent-color: #8A2BE2; /* Default VIOLET, will be changeable */
            --accent-hover: #9b4dff;
            --success-color: #00E676; 
            --danger-color: #ff3b30;
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.5);
            
            --priority-low: #3b82f6;
            --priority-medium: #f59e0b;
            --priority-high: #ef4444;

            --radius: 20px;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(var(--accent-color-rgb, 138, 43, 226), 0.15) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(0, 230, 118, 0.1) 0%, transparent 50%);
            background-size: cover;
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
            overflow-x: hidden;
            transition: background-image 0.5s;
        }

        .app-container {
            width: 100%;
            max-width: 1200px; /* Made wider for Kanban */
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            box-shadow: var(--glass-shadow);
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Top Settings & Level Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.2);
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 0.9rem;
            flex-wrap: wrap;
            gap: 10px;
        }

        .xp-widget {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .xp-level {
            font-weight: bold;
            color: var(--accent-color);
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 1.1rem;
        }
        
        .xp-bar-container {
            width: 150px;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }
        
        .xp-bar {
            height: 100%;
            background: var(--accent-color);
            width: 0%;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px var(--accent-color);
        }

        .app-tools {
            display: flex;
            gap: 10px;
        }

        .btn-small {
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            color: var(--text-main); cursor: pointer; padding: 6px 12px; border-radius: 8px;
            transition: var(--transition); display: flex; align-items: center; gap: 6px; font-size: 0.85rem;
        }
        .btn-small:hover { background: var(--accent-color); box-shadow: 0 0 10px rgba(138,43,226,0.3); }

        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }
        .title-block h1 { font-size: 2rem; font-weight: 700; }
        
        .header-actions { display: flex; gap: 10px; align-items: center; flex-grow: 1; justify-content: flex-end; }
        .search-input { background: rgba(0, 0, 0, 0.2); border: 1px solid var(--glass-border); border-radius: 10px; padding: 10px 15px; color: var(--text-main); font-size: 0.95rem; outline: none; transition: var(--transition); width: 100%; max-width: 250px;}
        .search-input:focus { border-color: var(--accent-color); }

        /* Task Form */
        .add-task-wrapper { background: rgba(0,0,0,0.2); border-radius: 12px; border: 1px solid var(--glass-border); display: flex; padding: 10px; gap: 10px; flex-wrap: wrap;}
        .task-input { flex-grow: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; font-size: 1rem; min-width: 250px;}
        .meta-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: white; padding: 8px 15px; border-radius: 8px; cursor:pointer;}
        .meta-btn:hover { border-color: var(--accent-color); }
        .btn-add { background: var(--accent-color); color: #fff; border: none; border-radius: 8px; padding: 8px 20px; cursor: pointer; font-weight: 600;}

        /* Options row (hidden initially for cleaner ui) */
        .task-options-row { display: none; width: 100%; gap: 10px; margin-top: 10px; }
        .task-options-row.active { display: flex; }
        .meta-input { background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); padding: 8px; border-radius: 8px; color: white; outline:none; }

        /* Board / List container */
        .view-container { min-height: 400px; display: flex; flex-direction: column; gap: 15px; }

        /* Kanban Layout */
        .kanban-board { display: none; gap: 20px; align-items: flex-start; }
        .kanban-column { flex: 1; background: rgba(0,0,0,0.1); border-radius: 16px; padding: 15px; border: 1px solid var(--glass-border); min-height: 300px; display: flex; flex-direction: column; gap:10px; }
        .kanban-header { font-weight: 600; text-align: center; margin-bottom: 10px; color: var(--text-muted); font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px;}
        
        .view-kanban .kanban-board { display: flex; }
        .view-kanban .list-board { display: none; }
        
        .list-board { display: flex; flex-direction: column; gap: 10px; }

        /* Task Item */
        .task-item {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); border-radius: 12px;
            padding: 15px; display: flex; flex-direction: column; gap: 10px; transition: var(--transition); cursor: grab;
            position: relative;
        }
        .task-item:hover { border-color: var(--accent-color); transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .task-item.dragging { opacity: 0.5; border: 2px dashed var(--accent-color); }
        .task-item.status-done { opacity: 0.7; }
        .task-item.status-done .task-text { text-decoration: line-through; color: var(--text-muted); }

        .task-head { display: flex; gap: 10px; align-items: flex-start; }
        
        .checkbox-container { display: block; position: relative; cursor: pointer; width: 20px; height: 20px; margin-top: 3px; }
        .checkbox-container input { position: absolute; opacity: 0; cursor: pointer; height: 0; width: 0; }
        .checkmark { position: absolute; top: 0; left: 0; height: 20px; width: 20px; background-color: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); border-radius: 4px; transition: var(--transition); }
        .checkbox-container input:checked ~ .checkmark { background-color: var(--success-color); border-color: var(--success-color); }
        .checkmark:after { content: ""; position: absolute; display: none; left: 6px; top: 2px; width: 4px; height: 9px; border: solid var(--bg-color); border-width: 0 2px 2px 0; transform: rotate(45deg); }
        .checkbox-container input:checked ~ .checkmark:after { display: block; }

        .task-text { flex-grow: 1; word-break: break-word; line-height: 1.4; font-size: 0.95rem; }
        .task-text strong { color: var(--accent-color); }

        /* Subtasks styling */
        .subtasks-list { margin-top: 5px; list-style: none; display: flex; flex-direction: column; gap: 5px; font-size: 0.85rem; color: var(--text-muted); }
        .subtask-item { display: flex; align-items: center; gap: 8px; cursor: pointer; transition: color 0.2s; }
        .subtask-item:hover { color: white; }
        .subtask-box { width: 14px; height: 14px; border: 1px solid var(--text-muted); border-radius: 3px; display: flex; align-items: center; justify-content: center; }
        .subtask-item.done .subtask-box { background: var(--success-color); border-color: var(--success-color); }
        .subtask-item.done span { text-decoration: line-through; }

        .task-foot { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; }
        .task-badges { display: flex; gap: 5px; flex-wrap: wrap; }
        .task-badge { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); }
        .priority-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .p-high { background: var(--danger-color); box-shadow: 0 0 5px var(--danger-color);}
        .p-medium { background: var(--priority-medium); box-shadow: 0 0 5px var(--priority-medium);}
        .p-low { background: var(--priority-low); box-shadow: 0 0 5px var(--priority-low);}

        .task-actions { display: flex; gap: 5px; opacity: 0; transition: var(--transition); }
        .task-item:hover .task-actions { opacity: 1; }
        .btn-action { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1rem; }
        .btn-action:hover { color: var(--accent-color); }
        .btn-action.del:hover { color: var(--danger-color); }

        /* Pomodoro Floating Widget */
        .pomodoro-widget {
            position: fixed; bottom: 30px; right: 30px; background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 20px; box-shadow: var(--glass-shadow); display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 100;
            width: 200px;
        }
        .pomo-header { font-size: 0.85rem; font-weight: bold; color: var(--text-muted); }
        .pomo-time { font-size: 2.5rem; font-weight: 700; color: var(--accent-color); text-shadow: 0 0 10px rgba(138,43,226,0.5); font-variant-numeric: tabular-nums;}
        .pomo-controls { display: flex; gap: 10px; }
        .pomo-btn { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.1); border: none; color: white; cursor: pointer; font-size: 1rem; transition: var(--transition);}
        .pomo-btn:hover { background: var(--accent-color); }

        /* Modals */
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 1000; display: none; justify-content: center; align-items: center; }
        .modal.active { display: flex; animation: fadeIn 0.2s ease; }
        .modal-content { background: var(--bg-color); border: 1px solid var(--glass-border); padding: 25px; border-radius: 16px; width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 15px;}
        .modal-header { font-size: 1.2rem; font-weight: 600; display: flex; justify-content: space-between; }
        
        .theme-grid { display: flex; gap: 10px; }
        .theme-circle { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .theme-circle:hover { transform: scale(1.1); }
        
        /* Edit textarea */
        .edit-tarea { width: 100%; min-height: 100px; background: rgba(0,0,0,0.3); border: 1px solid var(--accent-color); color: white; padding: 10px; border-radius: 8px; outline: none; font-family: monospace; resize: vertical; }

        @media (max-width: 800px) {
            .kanban-board { flex-direction: column; }
            .pomodoro-widget { bottom: 20px; right: 20px; transform: scale(0.8); transform-origin: bottom right; }
        }
    </style>
</head>
<body>

    <div class="app-container" id="app">
        
        <!-- Gamification & Top Bar -->
        <div class="top-bar">
            <div class="xp-widget">
                <div class="xp-level"><i class="fa-solid fa-star"></i> <span id="lvlText">Lvl 1</span></div>
                <div class="xp-bar-container" title="Опыт">
                    <div class="xp-bar" id="xpBar"></div>
                </div>
                <span style="font-size:0.8rem; color:var(--text-muted);" id="xpCurrentText">0 / 100</span>
            </div>
            
            <div class="app-tools">
                <button class="btn-small" onclick="toggleView()"><i class="fa-solid fa-columns"></i> <span id="viewLbl">Канбан</span></button>
                <button class="btn-small" onclick="document.getElementById('settingsModal').classList.add('active')"><i class="fa-solid fa-sliders"></i> Настройки</button>
                <button class="btn-small" onclick="exportData()"><i class="fa-solid fa-download"></i></button>
                <label class="btn-small" style="cursor:pointer; margin:0;"><i class="fa-solid fa-upload"></i><input type="file" id="importInput" style="display:none;" accept=".json"></label>
            </div>
        </div>

        <!-- Header -->
        <div class="header">
            <div class="title-block">
                <h1>TaskFlow Elite</h1>
            </div>
            <div class="header-actions">
                <input type="text" id="searchInput" class="search-input" placeholder="Поиск задач...">
            </div>
        </div>

        <!-- Add Task -->
        <div style="display:flex; flex-direction: column;">
            <div class="add-task-wrapper">
                <input type="text" id="addInput" class="task-input" placeholder="Добавить задачу. Подзадачи ('- [ ] text') в режиме редактирования">
                <button class="meta-btn" onclick="document.getElementById('optionsRow').classList.toggle('active')"><i class="fa-solid fa-ellipsis-vertical"></i></button>
                <button class="btn-add" onclick="addTask()"><i class="fa-solid fa-plus"></i> Создать</button>
            </div>
            <div class="task-options-row" id="optionsRow">
                <select id="addPriority" class="meta-input">
                    <option value="low">Low Priority</option>
                    <option value="medium" selected>Medium Priority</option>
                    <option value="high">High Priority</option>
                </select>
                <input type="date" id="addDate" class="meta-input">
                <input type="text" id="addTags" class="meta-input" style="flex-grow:1;" placeholder="Теги через запятую">
            </div>
        </div>

        <!-- Views Container -->
        <div class="view-container" id="viewContainer">
            
            <!-- List View -->
            <div class="list-board" id="listBoard"></div>

            <!-- Kanban View -->
            <div class="kanban-board">
                <div class="kanban-column" data-status="todo" ondragover="allowDrop(event)" ondrop="drop(event, 'todo')">
                    <div class="kanban-header">To Do</div>
                    <div class="kanban-dropzone" id="k-todo" style="flex-grow:1; display:flex; flex-direction:column; gap:10px;"></div>
                </div>
                <div class="kanban-column" data-status="in_progress" ondragover="allowDrop(event)" ondrop="drop(event, 'in_progress')">
                    <div class="kanban-header">In Progress</div>
                    <div class="kanban-dropzone" id="k-ip" style="flex-grow:1; display:flex; flex-direction:column; gap:10px;"></div>
                </div>
                <div class="kanban-column" data-status="done" ondragover="allowDrop(event)" ondrop="drop(event, 'done')">
                    <div class="kanban-header">Done</div>
                    <div class="kanban-dropzone" id="k-done" style="flex-grow:1; display:flex; flex-direction:column; gap:10px;"></div>
                </div>
            </div>
            
        </div>

    </div>

    <!-- Pomodoro Widget -->
    <div class="pomodoro-widget" id="pomodoro">
        <div class="pomo-header"><i class="fa-solid fa-brain"></i> ФОКУС</div>
        <div class="pomo-time" id="pomoTime">25:00</div>
        <div class="pomo-controls">
            <button class="pomo-btn" onclick="togglePomodoro()"><i class="fa-solid fa-play" id="pomoPlayIcon"></i></button>
            <button class="pomo-btn" onclick="resetPomodoro()"><i class="fa-solid fa-rotate-right"></i></button>
        </div>
    </div>


    <!-- Settings Modal -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">Настройки Ultimate <i class="fa-solid fa-xmark" style="cursor:pointer; color:gray;" onclick="document.getElementById('settingsModal').classList.remove('active')"></i></div>
            
            <label style="font-size:0.85rem; color:gray; margin-bottom:-10px;">Тема (Акцент)</label>
            <div class="theme-grid">
                <div class="theme-circle" style="background:#8A2BE2;" onclick="setTheme('#8A2BE2', '138,43,226')"></div>
                <div class="theme-circle" style="background:#00E676;" onclick="setTheme('#00E676', '0,230,118')"></div>
                <div class="theme-circle" style="background:#FF2A6D;" onclick="setTheme('#FF2A6D', '255,42,109')"></div>
                <div class="theme-circle" style="background:#FF9900;" onclick="setTheme('#FF9900', '255,153,0')"></div>
                <div class="theme-circle" style="background:#00D2FF;" onclick="setTheme('#00D2FF', '0,210,255')"></div>
            </div>

            <hr style="border:0; border-top:1px solid rgba(255,255,255,0.1); margin:10px 0;">

            <label style="font-size:0.85rem; color:gray; margin-bottom:-10px;">Telegram Напоминания (Уведомления о дедлайнах)</label>
            <p style="font-size:0.75rem; color:#aaa; line-height:1.3; margin:0;">Бот будет присылать напоминания о задачах на сегодня. Узнайте свой Chat ID через @userinfobot.</p>
            <input type="password" id="tgToken" placeholder="Bot Token..." class="meta-input" style="width:100%;">
            <input type="text" id="tgChatId" placeholder="Ваш Chat ID..." class="meta-input" style="width:100%; margin-top:5px;">
            
            <button class="btn-add" onclick="saveSettings()" style="width:100%; margin-top:10px;">Сохранить параметры</button>
        </div>
    </div>

    <!-- Edit Task Modal -->
    <div class="modal" id="editModal">
        <div class="modal-content" style="max-width:500px;">
            <div class="modal-header">Редактирование <i class="fa-solid fa-xmark" style="cursor:pointer; color:gray;" onclick="document.getElementById('editModal').classList.remove('active')"></i></div>
            <textarea id="editRawText" class="edit-tarea"></textarea>
            <p style="font-size:0.75rem; color:gray; margin-top:-5px;">Используйте <code>- [ ] текст</code> для создания подзадач.</p>
            <input type="hidden" id="editTaskId">
            <button class="btn-add" onclick="saveTaskEdit()" style="width:100%;">Сохранить</button>
        </div>
    </div>


    <script>
        // --- State ---
        let tasks = JSON.parse(localStorage.getItem('tasks_v3')) || [];
        let config = JSON.parse(localStorage.getItem('config_v3')) || { 
            themeColor: '#8A2BE2', themeRgb: '138,43,226', view: 'list', tgToken: '', tgChatId: '', 
            xp: 0, level: 1 
        };

        // DOM elements
        const app = document.getElementById('viewContainer');
        const listBoard = document.getElementById('listBoard');
        const searchInp = document.getElementById('searchInput');

        // Sounds via Web Audio API
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(type) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;
            if(type === 'pop') { osc.type='sine'; osc.frequency.setValueAtTime(500, now); osc.frequency.exponentialRampToValueAtTime(1000, now+0.1); gain.gain.setValueAtTime(0.5, now); gain.gain.exponentialRampToValueAtTime(0.01, now+0.1); osc.start(now); osc.stop(now+0.1); }
            if(type === 'ding'){ osc.type='triangle'; osc.frequency.setValueAtTime(800, now); osc.frequency.setValueAtTime(1200, now+0.1); gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now+0.4); osc.start(now); osc.stop(now+0.4); }
            if(type === 'lvlup'){ osc.type='square'; osc.frequency.setValueAtTime(400,now); osc.frequency.linearRampToValueAtTime(800,now+0.3); osc.frequency.linearRampToValueAtTime(1200,now+0.6); gain.gain.setValueAtTime(0.3,now); gain.gain.linearRampToValueAtTime(0,now+0.6); osc.start(now); osc.stop(now+0.6); }
        }

        // --- Gamification ---
        function addXP(amount) {
            config.xp += amount;
            const threshold = config.level * 100;
            if (config.xp >= threshold) {
                config.level++;
                config.xp -= threshold;
                playSfx('lvlup');
                showConfetti();
            }
            saveConfig();
            renderTopBar();
        }

        function renderTopBar() {
            document.getElementById('lvlText').innerText = `Lvl ${config.level}`;
            const threshold = config.level * 100;
            document.getElementById('xpCurrentText').innerText = `${config.xp} / ${threshold}`;
            document.getElementById('xpBar').style.width = `${(config.xp / threshold)*100}%`;
            
            // Theme apply
            document.documentElement.style.setProperty('--accent-color', config.themeColor);
            document.documentElement.style.setProperty('--accent-color-rgb', config.themeRgb);
            
            // View apply
            document.getElementById('viewContainer').className = `view-container view-${config.view}`;
            document.getElementById('viewLbl').innerText = config.view === 'list' ? 'Канбан' : 'Список';
        }

        function showConfetti() {
            // Very simple visual effect for level up
            const body = document.body;
            for(let i=0; i<30; i++) {
                let div = document.createElement('div');
                div.style.position = 'fixed';
                div.style.left = Math.random()*100 + 'vw';
                div.style.top = '-10px';
                div.style.width = '10px'; div.style.height = '10px';
                div.style.backgroundColor = ['#ff0', '#f0f', '#0ff', '#0f0'][Math.floor(Math.random()*4)];
                div.style.zIndex = 9999;
                div.style.transition = 'top 2s linear, transform 2s ease';
                body.appendChild(div);
                setTimeout(()=> { div.style.top = '110vh'; div.style.transform = `rotate(${Math.random()*360}deg)`; }, 50);
                setTimeout(()=> div.remove(), 2000);
            }
        }

        // --- Core ---
        function init() {
            renderTopBar();
            document.getElementById('tgToken').value = config.tgToken || '';
            document.getElementById('tgChatId').value = config.tgChatId || '';
            renderTasks();
            startReminderSystem();
        }

        function saveParams() {
            localStorage.setItem('tasks_v3', JSON.stringify(tasks));
        }
        function saveConfig() {
            localStorage.setItem('config_v3', JSON.stringify(config));
        }

        // Task parsing
        function parseText(raw) {
            let pureText = [];
            let subtasks = [];
            let lines = raw.split('\n');
            lines.forEach((l, i) => {
                let m = l.match(/^- \[([ xX])\] (.*)/);
                if (m) {
                    subtasks.push({ id: `st_${Date.now()}_${i}`, text: m[2], done: m[1].toLowerCase()==='x' });
                } else {
                    pureText.push(l);
                }
            });
            
            // Markdown bold/italic
            let htmlText = escapeHTML(pureText.join('\n'));
            htmlText = htmlText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            htmlText = htmlText.replace(/`(.*?)`/g, '<code style="background:rgba(255,255,255,0.1);padding:2px;border-radius:4px;">$1</code>');
            
            return { htmlText, subtasks };
        }

        function escapeHTML(str) { return str.replace(/[&<>'"]/g, t =>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[t]||t));}

        function renderTasks() {
            const query = searchInp.value.toLowerCase();
            const filtered = tasks.filter(t => t.raw.toLowerCase().includes(query) || (t.tags && t.tags.join(' ').toLowerCase().includes(query)));

            // Reset containers
            listBoard.innerHTML = '';
            document.getElementById('k-todo').innerHTML = '';
            document.getElementById('k-ip').innerHTML = '';
            document.getElementById('k-done').innerHTML = '';

            filtered.forEach(task => {
                const { htmlText, subtasks } = parseText(task.raw);
                const isDone = task.status === 'done';

                let tagHtml = (task.tags||[]).map(t => `<span class="task-badge">#${escapeHTML(t)}</span>`).join('');
                let dlHtml = task.deadline ? `<span class="task-badge"><i class="fa-solid fa-clock"></i> ${task.deadline}</span>` : '';
                
                let subHtml = '';
                if(subtasks.length > 0) {
                    let total = subtasks.length;
                    let doneC = subtasks.filter(s=>s.done).length;
                    subHtml = `<ul class="subtasks-list">
                        ${subtasks.map((s, idx) => `
                            <li class="subtask-item ${s.done?'done':''}" onclick="toggleSubtask('${task.id}', ${idx}, event)">
                                <div class="subtask-box">${s.done?'✔':''}</div> <span>${escapeHTML(s.text)}</span>
                            </li>
                        `).join('')}
                    </ul>`;
                }

                let elHtml = `
                    <div class="task-item ${isDone?'status-done':''}" draggable="true" ondragstart="drag(event, '${task.id}')" data-id="${task.id}">
                        <div class="task-head">
                            <label class="checkbox-container" onclick="event.stopPropagation()">
                                <input type="checkbox" onchange="toggleTask('${task.id}', this.checked)" ${isDone ? 'checked' : ''}>
                                <span class="checkmark"></span>
                            </label>
                            <div class="task-text">${htmlText} ${subHtml}</div>
                        </div>
                        <div class="task-foot">
                            <div class="task-badges">
                                <div class="priority-dot p-${task.priority}"></div>
                                ${tagHtml} ${dlHtml}
                            </div>
                            <div class="task-actions">
                                <button class="btn-action" title="Редактировать" onclick="openEdit('${task.id}')"><i class="fa-solid fa-pen"></i></button>
                                <button class="btn-action del" title="Удалить" onclick="deleteTask('${task.id}')"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </div>
                    </div>
                `;

                if(config.view === 'list') {
                    listBoard.insertAdjacentHTML('beforeend', elHtml);
                } else {
                    document.getElementById(task.status === 'todo' ? 'k-todo' : (task.status === 'in_progress' ? 'k-ip' : 'k-done')).insertAdjacentHTML('beforeend', elHtml);
                }
            });
        }

        searchInp.addEventListener('input', renderTasks);

        // Actions
        function addTask() {
            const val = document.getElementById('addInput').value.trim();
            if(!val) return;
            
            const prio = document.getElementById('addPriority').value;
            const date = document.getElementById('addDate').value;
            const tRaw = document.getElementById('addTags').value;
            const tags = tRaw ? tRaw.split(',').map(x=>x.trim()).filter(Boolean) : [];

            tasks.unshift({
                id: 't_'+Date.now(),
                raw: val,
                priority: prio,
                deadline: date,
                tags: tags,
                status: 'todo',
                notified: false // Флаг для напоминания
            });
            
            document.getElementById('addInput').value = '';
            document.getElementById('addTags').value = '';
            document.getElementById('optionsRow').classList.remove('active');
            
            playSfx('pop');
            addXP(2); // small reward for planning
            saveParams();
            renderTasks();
        }

        function toggleTask(id, checked) {
            let t = tasks.find(x => x.id === id);
            if(t) {
                if(checked && t.status !== 'done') {
                    playSfx('ding');
                    addXP(10); // Reward for completing
                }
                t.status = checked ? 'done' : 'todo';
                saveParams();
                renderTasks();
            }
        }

        function toggleSubtask(tId, sIdx, e) {
            e.stopPropagation();
            let t = tasks.find(x => x.id === tId);
            if(t) {
                // Reconstruct raw string logic: this is tricky. We'll reconstruct raw by parsing it, modifying the ast, and merging back
                let lines = t.raw.split('\n');
                let subcount = 0;
                for(let i=0; i<lines.length; i++) {
                    let m = lines[i].match(/^- \[([ xX])\] (.*)/);
                    if(m){
                        if(subcount === sIdx) {
                            let wasDone = m[1].toLowerCase() === 'x';
                            lines[i] = `- [${wasDone?' ':'x'}] ${m[2]}`;
                            if(!wasDone) { playSfx('pop'); addXP(3); } // 3 xp for subtask
                            break;
                        }
                        subcount++;
                    }
                }
                t.raw = lines.join('\n');
                saveParams();
                renderTasks();
            }
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveParams();
            renderTasks();
        }

        // Edit Modal
        function openEdit(id) {
            let t = tasks.find(x=>x.id === id);
            document.getElementById('editTaskId').value = t.id;
            document.getElementById('editRawText').value = t.raw;
            document.getElementById('editModal').classList.add('active');
        }
        
        function saveTaskEdit() {
            let id = document.getElementById('editTaskId').value;
            let val = document.getElementById('editRawText').value;
            let t = tasks.find(x=>x.id === id);
            if(t && val.trim()) {
                t.raw = val.trim();
                saveParams();
                renderTasks();
            }
            document.getElementById('editModal').classList.remove('active');
        }

        // Drag & Drop
        let draggedId = null;
        function drag(e, id) {
            draggedId = id;
            setTimeout(()=> e.target.classList.add('dragging'), 0);
        }
        function allowDrop(e) {
            e.preventDefault();
        }
        function drop(e, newStatus) {
            e.preventDefault();
            if(draggedId) {
                let t = tasks.find(x=>x.id === draggedId);
                if(t && t.status !== newStatus) {
                    if(newStatus === 'done') { playSfx('ding'); addXP(10); } // Completed via drag
                    t.status = newStatus;
                    saveParams();
                    renderTasks();
                }
            }
            draggedId = null;
            document.querySelectorAll('.dragging').forEach(el=>el.classList.remove('dragging'));
        }
        document.addEventListener('dragend', () => { draggedId=null; document.querySelectorAll('.dragging').forEach(el=>el.classList.remove('dragging')); });

        // --- Toolbar ---
        function toggleView() {
            config.view = config.view === 'list' ? 'kanban' : 'list';
            saveConfig();
            renderTopBar();
            renderTasks();
        }

        function setTheme(hex, rgb) {
            config.themeColor = hex;
            config.themeRgb = rgb;
            saveConfig();
            renderTopBar();
        }

        function saveSettings() {
            config.tgToken = document.getElementById('tgToken').value.trim();
            config.tgChatId = document.getElementById('tgChatId').value.trim();
            saveConfig();
            document.getElementById('settingsModal').classList.remove('active');
            startReminderSystem();
            if(config.tgToken && config.tgChatId) {
                sendTelegramMsg("✅ Напоминания TaskFlow Elite успешно настроены!");
            }
        }

        // Data Export/Import
        function exportData() {
            const dataStr = JSON.stringify({ tasks, config });
            let blob = new Blob([dataStr], {type: "application/json"});
            let url = URL.createObjectURL(blob);
            let a = document.createElement('a');
            a.href = url; a.download = 'taskflow-master-backup.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        document.getElementById('importInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(evt) {
                try {
                    let d = JSON.parse(evt.target.result);
                    if(d.tasks) tasks = d.tasks;
                    if(d.config) config = d.config;
                    saveParams(); saveConfig();
                    init();
                    alert('Данные успешно загружены!');
                } catch(err) { alert('Ошибка формата файла!'); }
            };
            reader.readAsText(file);
        });

        // --- Pomodoro ---
        let pomoTime = 25 * 60;
        let pomoInterval = null;
        let isPomoRunning = false;
        
        function formatTime(s) {
            let m = Math.floor(s/60).toString().padStart(2,'0');
            let sec = (s%60).toString().padStart(2,'0');
            return `${m}:${sec}`;
        }
        function updatePomoUI() {
            document.getElementById('pomoTime').innerText = formatTime(pomoTime);
            document.getElementById('pomoPlayIcon').className = isPomoRunning ? "fa-solid fa-pause" : "fa-solid fa-play";
        }
        function togglePomodoro() {
            if(isPomoRunning) {
                clearInterval(pomoInterval);
                isPomoRunning = false;
            } else {
                isPomoRunning = true;
                pomoInterval = setInterval(()=> {
                    if(pomoTime > 0) {
                        pomoTime--;
                        updatePomoUI();
                    } else {
                        clearInterval(pomoInterval);
                        isPomoRunning = false;
                        playSfx('ding');
                        addXP(50); // Big reward for focus session
                        alert("Pomodoro завершен! Отличная работа!");
                        pomoTime = 5 * 60; // 5 min break
                        updatePomoUI();
                    }
                }, 1000);
            }
            updatePomoUI();
        }
        function resetPomodoro() {
            clearInterval(pomoInterval);
            isPomoRunning = false;
            pomoTime = 25 * 60;
            updatePomoUI();
        }


        // --- Reminders System (Push to Telegram) ---
        let reminderTimer = null;

        async function sendTelegramMsg(text) {
            if(!config.tgToken || !config.tgChatId) return;
            try {
                await fetch(`https://api.telegram.org/bot${config.tgToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: config.tgChatId, text: text, parse_mode: 'Markdown' })
                });
            } catch(e) { console.log('TG Send error', e); }
        }
        
        function checkReminders() {
            if(!config.tgToken || !config.tgChatId) return;
            
            const todayStr = new Date().toISOString().split('T')[0];
            let changed = false;

            tasks.forEach(t => {
                if(t.status !== 'done' && t.deadline === todayStr && !t.notified) {
                    const pureText = t.raw.split('\n')[0].replace(/[-*`]/g, '').trim(); 
                    sendTelegramMsg(`⏰ *Напоминание!*\nСегодня дедлайн по задаче:\n${pureText}`);
                    t.notified = true;
                    changed = true;
                }
            });

            if(changed) saveParams();
        }

        function startReminderSystem() {
            if(reminderTimer) clearInterval(reminderTimer);
            if(config.tgToken && config.tgChatId) {
                reminderTimer = setInterval(checkReminders, 60000); // Check every minute
                checkReminders(); 
            }
        }

        // Init
        init();

    </script>
</body>
</html>
